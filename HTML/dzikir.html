<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dzikir Harian</title>

    <link rel="stylesheet" href="../main.css">
    <link rel="stylesheet" href="../dzikir.css">
    <link rel="stylesheet" href="../responsive.css">
</head>
<body>

<header>
    <h1>🌙 Dzikir Harian</h1>
    <nav>
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
    </nav>
</header>

<main>
    <section class="dzikir-wrapper">

        <div class="dzikir-card">

    <h2>Hitung Dzikir Anda</h2>

    <!-- PILIH JENIS DZIKIR -->
    <div class="target-select">
        <label>Pilih Dzikir:</label>
        <select id="dzikirType">
            <option value="tasbih" data-target="33">Tasbih (33x)</option>
            <option value="tahmid" data-target="33">Tahmid (33x)</option>
            <option value="takbir" data-target="33">Takbir (34x)</option>
            <option value="istighfar" data-target="100">Istighfar (100x)</option>
            <option value="custom" data-target="0">Custom</option>
        </select>

        <input type="number" id="customTarget" placeholder="Masukkan target..." min="1">
    </div>

    <div class="counter-box">
        <span id="counter">0</span>
    </div>

    <div class="target-badge">
        🎯 Target: <span id="target">33</span>
    </div>

    <div class="button-group">
        <button id="addBtn" class="btn-add">+</button>
        <button id="resetBtn" class="btn-reset">Reset</button>
    </div>

    <div id="notification" class="notification"></div>

</div>

    </section>
</main>

<footer>
    <p>Teruslah Berdzikir 🌿</p>
</footer>

<script src="../dzikir.js"></script>
</body>
</html>
